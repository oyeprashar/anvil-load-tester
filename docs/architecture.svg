<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#172d4a"/>
    </linearGradient>
    <linearGradient id="backendGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a2f"/>
      <stop offset="100%" style="stop-color:#14291f"/>
    </linearGradient>
    <linearGradient id="obsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1e1e"/>
      <stop offset="100%" style="stop-color:#2a1414"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34d399"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fb923c"/>
    </marker>
    <marker id="arrowBlueBack" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9" letter-spacing="1">⚒️  Anvil — Architecture</text>

  <!-- ─── Browser box ─── -->
  <rect x="30" y="60" width="220" height="310" rx="10" fill="url(#browserGrad)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#93c5fd">🌐  Browser</text>

  <!-- UI chips -->
  <rect x="50" y="98" width="180" height="30" rx="6" fill="#1d3557" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="118" text-anchor="middle" font-size="11" fill="#bfdbfe">React + TypeScript (Vite)</text>

  <rect x="50" y="140" width="180" height="26" rx="5" fill="#162032" stroke="#2563eb" stroke-width="0.8"/>
  <text x="140" y="157" text-anchor="middle" font-size="11" fill="#93c5fd">TestConfig Form</text>

  <rect x="50" y="174" width="180" height="26" rx="5" fill="#162032" stroke="#2563eb" stroke-width="0.8"/>
  <text x="140" y="191" text-anchor="middle" font-size="11" fill="#93c5fd">Results Panel</text>

  <rect x="50" y="208" width="180" height="26" rx="5" fill="#162032" stroke="#2563eb" stroke-width="0.8"/>
  <text x="140" y="225" text-anchor="middle" font-size="11" fill="#93c5fd">Suite DAG Editor</text>

  <rect x="50" y="242" width="180" height="26" rx="5" fill="#162032" stroke="#2563eb" stroke-width="0.8"/>
  <text x="140" y="259" text-anchor="middle" font-size="11" fill="#93c5fd">History Panel</text>

  <rect x="50" y="276" width="180" height="26" rx="5" fill="#162032" stroke="#2563eb" stroke-width="0.8"/>
  <text x="140" y="293" text-anchor="middle" font-size="11" fill="#93c5fd">Metrics Chart</text>

  <rect x="50" y="310" width="180" height="26" rx="5" fill="#162032" stroke="#2563eb" stroke-width="0.8"/>
  <text x="140" y="327" text-anchor="middle" font-size="11" fill="#93c5fd">Comparison View</text>

  <!-- ─── Backend box ─── -->
  <rect x="320" y="60" width="240" height="360" rx="10" fill="url(#backendGrad)" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#86efac">🖥️  Go HTTP Server  :8080</text>

  <!-- Transpiler -->
  <rect x="345" y="100" width="190" height="52" rx="8" fill="#14371f" stroke="#16a34a" stroke-width="1.2"/>
  <text x="440" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#4ade80">⚙️  Transpiler</text>
  <text x="440" y="140" text-anchor="middle" font-size="10" fill="#86efac">Go text/template → k6 JS</text>

  <!-- arrow down -->
  <line x1="440" y1="152" x2="440" y2="175" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Runner -->
  <rect x="345" y="178" width="190" height="52" rx="8" fill="#14371f" stroke="#16a34a" stroke-width="1.2"/>
  <text x="440" y="200" text-anchor="middle" font-size="12" font-weight="600" fill="#4ade80">🏃  Runner</text>
  <text x="440" y="218" text-anchor="middle" font-size="10" fill="#86efac">exec k6 subprocess · SSE</text>

  <!-- arrow down -->
  <line x1="440" y1="230" x2="440" y2="253" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- History Store -->
  <rect x="345" y="256" width="190" height="52" rx="8" fill="#14371f" stroke="#16a34a" stroke-width="1.2"/>
  <text x="440" y="278" text-anchor="middle" font-size="12" font-weight="600" fill="#4ade80">🗂️  History Store</text>
  <text x="440" y="296" text-anchor="middle" font-size="10" fill="#86efac">in-memory ring buffer · 200 runs</text>

  <!-- divider -->
  <line x1="345" y1="328" x2="535" y2="328" stroke="#166534" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Metrics endpoint -->
  <rect x="345" y="338" width="190" height="52" rx="8" fill="#14371f" stroke="#15803d" stroke-width="1"/>
  <text x="440" y="360" text-anchor="middle" font-size="12" font-weight="600" fill="#4ade80">📡  /metrics</text>
  <text x="440" y="378" text-anchor="middle" font-size="10" fill="#86efac">Prometheus text format</text>

  <!-- ─── Observability box ─── -->
  <rect x="640" y="60" width="220" height="220" rx="10" fill="url(#obsGrad)" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="750" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#fdba74">📊  Observability Stack</text>

  <!-- Prometheus -->
  <rect x="660" y="100" width="180" height="60" rx="8" fill="#2d1515" stroke="#ea580c" stroke-width="1.2"/>
  <text x="750" y="126" text-anchor="middle" font-size="12" font-weight="600" fill="#fb923c">🔥  Prometheus</text>
  <text x="750" y="145" text-anchor="middle" font-size="10" fill="#fed7aa">:9090 · scrapes every 15s</text>

  <!-- arrow down -->
  <line x1="750" y1="160" x2="750" y2="185" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Grafana -->
  <rect x="660" y="188" width="180" height="60" rx="8" fill="#2d1515" stroke="#ea580c" stroke-width="1.2"/>
  <text x="750" y="214" text-anchor="middle" font-size="12" font-weight="600" fill="#fb923c">📈  Grafana</text>
  <text x="750" y="232" text-anchor="middle" font-size="10" fill="#fed7aa">:3001 · auto-provisioned</text>

  <!-- ─── k6 box ─── -->
  <rect x="640" y="310" width="220" height="110" rx="10" fill="#1e1b3a" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="750" y="335" text-anchor="middle" font-size="13" font-weight="600" fill="#c4b5fd">⚡  k6  v1.4.2</text>
  <text x="750" y="358" text-anchor="middle" font-size="10" fill="#a78bfa">custom binary via xk6</text>
  <rect x="660" y="368" width="80" height="24" rx="5" fill="#2d1b5e" stroke="#7c3aed" stroke-width="0.8"/>
  <text x="700" y="384" text-anchor="middle" font-size="10" fill="#c4b5fd">HTTP</text>
  <rect x="750" y="368" width="80" height="24" rx="5" fill="#2d1b5e" stroke="#7c3aed" stroke-width="0.8"/>
  <text x="790" y="384" text-anchor="middle" font-size="10" fill="#c4b5fd">Kafka</text>
  <rect x="660" y="396" width="80" height="24" rx="5" fill="#2d1b5e" stroke="#7c3aed" stroke-width="0.8"/>
  <text x="700" y="412" text-anchor="middle" font-size="10" fill="#c4b5fd">gRPC</text>
  <rect x="750" y="396" width="80" height="24" rx="5" fill="#2d1b5e" stroke="#7c3aed" stroke-width="0.8"/>
  <text x="790" y="412" text-anchor="middle" font-size="10" fill="#c4b5fd">Redis</text>

  <!-- ─── Arrows: Browser ↔ Backend ─── -->
  <!-- POST /api/test/run -->
  <line x1="230" y1="128" x2="340" y2="128" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="240" y="112" width="90" height="14" rx="3" fill="#0f172a"/>
  <text x="285" y="123" text-anchor="middle" font-size="9" fill="#93c5fd">POST /api/test/run</text>

  <!-- SSE stream -->
  <line x1="340" y1="200" x2="230" y2="200" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlueBack)"/>
  <rect x="240" y="184" width="90" height="14" rx="3" fill="#0f172a"/>
  <text x="285" y="195" text-anchor="middle" font-size="9" fill="#93c5fd">SSE log stream</text>

  <!-- GET /api/runs -->
  <line x1="230" y1="270" x2="340" y2="270" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="340" y1="280" x2="230" y2="280" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlueBack)"/>
  <rect x="240" y="258" width="90" height="14" rx="3" fill="#0f172a"/>
  <text x="285" y="268" text-anchor="middle" font-size="9" fill="#93c5fd">REST /api/runs</text>

  <!-- ─── Arrow: Backend → Observability (scrape) ─── -->
  <line x1="560" y1="364" x2="638" y2="364" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  <rect x="566" y="350" width="66" height="14" rx="3" fill="#0f172a"/>
  <text x="599" y="360" text-anchor="middle" font-size="9" fill="#fed7aa">scrape /metrics</text>

  <!-- ─── Arrow: Runner → k6 ─── -->
  <line x1="560" y1="204" x2="638" y2="340" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <rect x="578" y="258" width="50" height="14" rx="3" fill="#0f172a"/>
  <text x="603" y="268" text-anchor="middle" font-size="9" fill="#c4b5fd">exec k6</text>

  <!-- ─── Legend ─── -->
  <rect x="30" y="490" width="840" height="54" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="55" y="510" font-size="11" fill="#94a3b8">Legend:</text>
  <line x1="110" y1="507" x2="145" y2="507" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="150" y="511" font-size="10" fill="#93c5fd">HTTP / SSE request</text>
  <line x1="280" y1="507" x2="315" y2="507" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  <text x="320" y="511" font-size="10" fill="#fed7aa">Prometheus scrape</text>
  <line x1="450" y1="507" x2="485" y2="507" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="490" y="511" font-size="10" fill="#86efac">Internal data flow</text>
  <line x1="620" y1="507" x2="655" y2="507" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="660" y="511" font-size="10" fill="#c4b5fd">k6 subprocess</text>

  <text x="55" y="532" font-size="10" fill="#64748b">All services start with a single:  docker compose up --build</text>
  <text x="700" y="532" font-size="10" fill="#475569">MIT © 2025 Shubham Prashar</text>
</svg>
